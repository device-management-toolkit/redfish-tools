---
name: Sync Redfish Artifacts To Console

"on":
  pull_request:
    types: [closed]
    paths:
      - openapi/dmtf/**
  workflow_dispatch:  # allows manual trigger from Actions UI

jobs:
  sync-to-console:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SOURCE_LABEL: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('manual-{0}', github.run_id) }}
      SOURCE_URL: ${{ github.event_name == 'pull_request' && github.event.pull_request.html_url || format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}

    steps:
      - name: Checkout redfish-tools
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Validate required secret
        env:
          CONSOLE_APP_ID: ${{ secrets.CONSOLE_APP_ID }}
          CONSOLE_APP_PRIVATE_KEY: ${{ secrets.CONSOLE_APP_PRIVATE_KEY }}
        run: |
          if [ -z "$CONSOLE_APP_ID" ] || [ -z "$CONSOLE_APP_PRIVATE_KEY" ]; then
            echo "CONSOLE_APP_ID and/or CONSOLE_APP_PRIVATE_KEY are not configured."
            echo "Add these repository secrets before running the workflow."
            exit 1
          fi

      - name: Generate GitHub App token for console repo
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CONSOLE_APP_ID }}
          private-key: ${{ secrets.CONSOLE_APP_PRIVATE_KEY }}
          owner: device-management-toolkit
          repositories: console

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: '1.24.x'

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.x'

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'

      - name: Install tool dependencies
        run: |
          python3 -m pip install --upgrade pip==24.3.1
          python3 -m pip install PyYAML==6.0.2
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.5.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          npm install -g @apidevtools/swagger-cli@4.0.4

      - name: Generate Redfish artifacts
        run: make -C openapi/infra rf-all

      - name: Checkout console redfish branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: device-management-toolkit/console
          ref: redfish
          token: ${{ steps.app-token.outputs.token }}
          path: console

      - name: Copy generated artifacts into console tree
        run: |
          mkdir -p console/redfish/openapi
          mkdir -p console/redfish/internal/controller/http/v1/generated
          mkdir -p console/redfish/internal/controller/http/v1/handler
          cp openapi/artifacts/redfish-openapi.yaml console/redfish/openapi/redfish-openapi.yaml
          cp openapi/artifacts/generated/spec.gen.go console/redfish/internal/controller/http/v1/generated/spec.gen.go
          cp openapi/artifacts/generated/types.gen.go console/redfish/internal/controller/http/v1/generated/types.gen.go
          cp openapi/artifacts/generated/server.gen.go console/redfish/internal/controller/http/v1/generated/server.gen.go
          cp openapi/artifacts/metadata.xml console/redfish/internal/controller/http/v1/handler/metadata.xml

      - name: Create pull request in console
        id: create-pr
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676  # v7.0.11
        with:
          token: ${{ steps.app-token.outputs.token }}
          path: console
          delete-branch: true  # clean up branch if PR is closed without merge
          commit-message: "chore(redfish): sync generated artifacts from redfish-tools"
          branch: "automation/redfish-sync-${{ env.SOURCE_LABEL }}"
          base: redfish
          title: "chore: sync Redfish artifacts from redfish-tools ${{ env.SOURCE_LABEL }}"
          body: |
            Automated sync of generated Redfish artifacts from redfish-tools.

            Source:
            - ${{ env.SOURCE_LABEL }}
            - ${{ env.SOURCE_URL }}

            Generated and synced files:
            - redfish/openapi/redfish-openapi.yaml
            - redfish/internal/controller/http/v1/generated/spec.gen.go
            - redfish/internal/controller/http/v1/generated/types.gen.go
            - redfish/internal/controller/http/v1/generated/server.gen.go
            - redfish/internal/controller/http/v1/handler/metadata.xml
          labels: |
            automation
            redfish
          signoff: true

      - name: Summary
        run: |
          echo "### Redfish Sync Complete" >> $GITHUB_STEP_SUMMARY
          echo "Console PR: ${{ steps.create-pr.outputs.pull-request-url }}" >> $GITHUB_STEP_SUMMARY
