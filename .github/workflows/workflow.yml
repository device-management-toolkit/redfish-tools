name: Sync Redfish Artifacts To Console

on:
  pull_request:
    types: [closed]
    paths:
      - openapi/dmtf/**

jobs:
  sync-to-console:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SOURCE_LABEL: ${{ format('pr-{0}', github.event.pull_request.number) }}
      SOURCE_URL: ${{ github.event.pull_request.html_url }}

    steps:
      - name: Checkout redfish-tools
        uses: actions/checkout@v4

      - name: Validate required secret
        env:
          CONSOLE_REPO_TOKEN: ${{ secrets.CONSOLE_REPO_TOKEN }}
        run: |
          if [ -z "$CONSOLE_REPO_TOKEN" ]; then
            echo "CONSOLE_REPO_TOKEN is not configured."
            echo "Add this repository secret before running the workflow."
            exit 1
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install tool dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install PyYAML
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.5.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          npm install -g @apidevtools/swagger-cli

      - name: Generate Redfish artifacts
        run: make -C openapi/infra rf-all

      - name: Checkout console redfish branch
        uses: actions/checkout@v4
        with:
          repository: device-management-toolkit/console
          ref: redfish
          token: ${{ secrets.CONSOLE_REPO_TOKEN }}
          path: console

      - name: Copy generated artifacts into console tree
        run: |
          mkdir -p console/redfish/openapi/merged
          mkdir -p console/redfish/internal/controller/http/v1/generated
          mkdir -p console/redfish/internal/controller/http/v1/handler
          cp openapi/artifacts/redfish-openapi.yaml console/redfish/openapi/merged/redfish-openapi.yaml
          cp openapi/artifacts/generated/spec.gen.go console/redfish/internal/controller/http/v1/generated/spec.gen.go
          cp openapi/artifacts/generated/types.gen.go console/redfish/internal/controller/http/v1/generated/types.gen.go
          cp openapi/artifacts/generated/server.gen.go console/redfish/internal/controller/http/v1/generated/server.gen.go
          cp openapi/artifacts/metadata.xml console/redfish/internal/controller/http/v1/handler/metadata.xml

      - name: Create pull request in console
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.CONSOLE_REPO_TOKEN }}
          path: console
          commit-message: "Sync Redfish generated artifacts from redfish-tools"
          branch: "automation/redfish-sync-${{ env.SOURCE_LABEL }}-${{ github.run_id }}"
          base: redfish
          title: "Sync Redfish artifacts from redfish-tools ${{ env.SOURCE_LABEL }}"
          body: |
            Automated sync of generated Redfish artifacts from redfish-tools.

            Source:
            - ${{ env.SOURCE_LABEL }}
            - ${{ env.SOURCE_URL }}

            Generated and synced files:
            - redfish/openapi/merged/redfish-openapi.yaml
            - redfish/internal/controller/http/v1/generated/spec.gen.go
            - redfish/internal/controller/http/v1/generated/types.gen.go
            - redfish/internal/controller/http/v1/generated/server.gen.go
            - redfish/internal/controller/http/v1/handler/metadata.xml
          labels: |
            automation
            redfish
          signoff: true